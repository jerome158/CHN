name: gfast

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:  
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-mirrors:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml
          
      - name: Run mirror fetcher with realtime search
        run: |
          python gitfast/scripts/fetch_mirrors.py
        env:
          ENABLE_REALTIME_SEARCH: 'true'
          ENABLE_DYNAMIC_MANAGEMENT: 'true'
          
      - name: Generate GitHub Pages
        run: |
          python gitfast/scripts/generate_pages.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add gitfast/mirrors.json gitfast/gitfast.txt gitfast/docs/
          git diff --staged --quiet || git commit -m "Auto update: mirrors and pages [skip ci]"
          git pull --rebase --autostash
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gitfast/docs
